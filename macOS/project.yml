name: Dicticus
options:
  bundleIdPrefix: com.dicticus
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  groupSortPosition: none
  createIntermediateGroups: true
  defaultConfig: Debug

# Debug-Recorder is a dev-only configuration that inherits Debug and turns on
# the DEBUG_RECORDER compilation condition. Used by the `Dicticus-Debug-Recorder`
# scheme below; the public `Dicticus` scheme (Release) never sees the flag, so
# the GitHub-released DMG contains zero recorder symbols.
configs:
  Debug: debug
  Release: release
  Debug-Recorder: debug

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.13.6
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: 2.4.0
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern.git
    from: 1.1.0
  llama:
    url: https://github.com/mattt/llama.swift.git
    from: 2.8832.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.0.0

targets:
  Dicticus:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Dicticus
      - path: ../Shared
    resources:
      - path: Dicticus/Assets.xcassets
      - path: ../Shared/Resources
    info:
      path: Dicticus/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "Dicticus needs microphone access to transcribe your speech. Your audio never leaves this device."
        NSAppleEventsUsageDescription: "Dicticus pauses your music while you dictate."
        CFBundleIdentifier: com.dicticus.app
        CFBundleVersion: "5"
        CFBundleShortVersionString: "1.3.0"
        SUFeedURL: "https://maksim-101.github.io/dicticus-macos/appcast.xml"
        SUPublicEDKey: "svsiIi/mzzxOO1K9AJ7yAXboJb+U0wDoLCoLM1hEqjc="
        SUEnableAutomaticChecks: YES
    entitlements:
      path: Dicticus/Dicticus.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.com.dicticus
        com.apple.security.automation.apple-events: true
        com.apple.security.device.audio-input: true
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dicticus.app
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Dicticus/Dicticus.entitlements
        INFOPLIST_FILE: Dicticus/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: ${DEVELOPER_TEAM_ID}
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        OTHER_LDFLAGS: "-framework llama"
      configs:
        Debug-Recorder:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG DEBUG_RECORDER"
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: LaunchAtLogin
        product: LaunchAtLogin
      - package: llama
        product: LlamaSwift
      - package: Sparkle
        product: Sparkle
      - package: GRDB
        product: GRDB
    scheme:
      testTargets:
        - DicticusTests
      gatherCoverageData: false

  DicticusTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: DicticusTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug-Recorder:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG DEBUG_RECORDER"
    dependencies:
      - target: Dicticus
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: llama
        product: LlamaSwift
      - package: GRDB
        product: GRDB

# Top-level schemes — the per-target `scheme:` shorthand on Dicticus generates
# the default `Dicticus` scheme (Debug→Run, Release→Archive) used by
# scripts/build-dmg.sh. This adds a parallel scheme that runs the
# Debug-Recorder configuration so a developer can enable on-disk cleanup
# tracing locally without touching anything the public release path uses.
schemes:
  Dicticus-Debug-Recorder:
    build:
      targets:
        Dicticus: all
    run:
      config: Debug-Recorder
    test:
      config: Debug-Recorder
      targets:
        - DicticusTests
    profile:
      config: Debug-Recorder
    analyze:
      config: Debug-Recorder
    archive:
      config: Debug-Recorder
